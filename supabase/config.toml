# FlyFam — Supabase configuration
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "flyfam"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[functions.notify-family]
verify_jwt = false

[functions.update-flights-from-api]
verify_jwt = true

[auth]
enabled = true
site_url = "http://127.0.0.1:8081"
additional_redirect_urls = ["exp://127.0.0.1:8081", "http://localhost:8081"]
enable_signup = true
enable_anonymous_sign_ins = false
